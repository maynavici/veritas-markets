<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veritas Markets — Maintenance</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Roboto+Mono:wght@500;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --cyan:#32EAFF; --purple:#7B5CFF; --magenta:#C84DFF;
      --text:#F7FBFF; --soft:#AEB9CC; --muted:#6F7A91;
      --display:"Sora","Plus Jakarta Sans",system-ui,sans-serif;
      --ui:"Plus Jakarta Sans",system-ui,sans-serif;
      --mono:"Roboto Mono",Consolas,monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:var(--ui); color:var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(50,234,255,.15), transparent 34%),
        radial-gradient(circle at 82% 0%, rgba(123,92,255,.19), transparent 36%),
        linear-gradient(180deg,#000 0%,#050713 52%,#000 100%);
      overflow:hidden;
    }
    body:before{
      content:""; position:fixed; inset:-30%;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px);
      background-size:64px 64px;
      transform:perspective(900px) rotateX(60deg) translateY(80px);
      opacity:.45; animation:grid 7s linear infinite;
    }
    body:after{
      content:""; position:fixed; inset:0;
      background:radial-gradient(circle at center, transparent 0%, transparent 42%, rgba(0,0,0,.82) 100%);
      pointer-events:none;
    }
    .card{
      position:relative; z-index:2; width:min(92vw,820px);
      padding:48px 34px; border:1px solid rgba(255,255,255,.13);
      border-radius:36px;
      background:
        radial-gradient(circle at 25% 0%, rgba(50,234,255,.11), transparent 34%),
        radial-gradient(circle at 90% 10%, rgba(123,92,255,.13), transparent 40%),
        linear-gradient(180deg,rgba(16,19,36,.78),rgba(4,6,14,.82));
      box-shadow:
        0 44px 160px rgba(0,0,0,.70),
        0 0 100px rgba(50,234,255,.11),
        inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:blur(22px); text-align:center;
    }
    .v{
      width:96px; height:96px; margin:0 auto 26px; display:grid; place-items:center;
      border-radius:30px; color:#02030A; font-family:var(--display);
      font-size:58px; font-weight:800; letter-spacing:-.12em; transform:translateX(-2px);
      background:
        radial-gradient(circle at 28% 14%,rgba(255,255,255,.95),transparent 28%),
        linear-gradient(135deg,#7AF8FF 0%,var(--cyan) 38%,var(--purple) 75%,var(--magenta) 100%);
      box-shadow:
        0 0 46px rgba(50,234,255,.28),
        0 0 74px rgba(123,92,255,.22),
        inset 0 1px 1px rgba(255,255,255,.7);
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid rgba(50,234,255,.22); border-radius:999px;
      padding:9px 13px; background:rgba(50,234,255,.055);
      color:var(--cyan); font-family:var(--mono); font-size:11px;
      font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:18px;
    }
    .dot{
      width:7px; height:7px; border-radius:50%; background:var(--cyan);
      box-shadow:0 0 18px var(--cyan); animation:blink 1.15s ease-in-out infinite;
    }
    h1{
      margin:0; font-family:var(--display);
      font-size:clamp(42px,7vw,82px); line-height:.88; letter-spacing:-.08em;
      background:linear-gradient(180deg,#fff 0%,#eaf8ff 50%,#9eb0c9 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    p{
      max-width:620px; margin:20px auto 0; color:var(--soft);
      line-height:1.75; font-size:16px; font-weight:600;
    }
    .footer{
      margin-top:30px; color:var(--muted); font-family:var(--mono);
      font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    }
    @keyframes grid{
      from{transform:perspective(900px) rotateX(60deg) translateY(80px)}
      to{transform:perspective(900px) rotateX(60deg) translateY(144px)}
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.36}}
  </style>
</head>
<body>
  <main class="card">
    <div class="v">V</div>
    <div class="pill"><span class="dot"></span>Maintenance mode</div>
    <h1>Veritas is upgrading.</h1>
    <p>The trader discipline cockpit is temporarily offline while we polish the system. We’ll be back shortly with a cleaner, sharper experience.</p>
    <div class="footer">No signals · No noise · Just execution</div>
  </main>
</body>
</html>
